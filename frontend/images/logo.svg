<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C19B3D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a1a" stroke="url(#goldGradient)" stroke-width="1.5"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="44" fill="#0F0F0F"/>
  
  <!-- Fork left -->
  <g transform="translate(30, 35)">
    <path d="M 2 20 L 2 5 M 0 8 L 0 20 M 2 8 L 2 20 M 4 8 L 4 20" 
          stroke="url(#goldGradient)" stroke-width="2" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  </g>
  
  <!-- Knife right -->
  <g transform="translate(54, 35)">
    <path d="M 0 5 L 0 20 L 3 20 L 3 5 Z M 0 12 L 3 12" 
          fill="url(#goldGradient)" opacity="0.9" filter="url(#shadow)"/>
    <path d="M 1.5 5 L 1.5 20" stroke="#0F0F0F" stroke-width="0.8"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="35" cy="25" r="2" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="65" cy="25" r="2" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="35" cy="75" r="2" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="65" cy="75" r="2" fill="url(#goldGradient)" opacity="0.6"/>
  
  <!-- Letter G and I in center -->
  <text x="50" y="72" font-family="'Playfair Display', serif" font-size="24" font-weight="700" 
        fill="url(#goldGradient)" text-anchor="middle" filter="url(#shadow)">GI</text>
</svg>